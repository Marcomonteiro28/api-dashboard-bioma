<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bioma · Casa Vertical · Funil CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F2EDE7;
    --card: #FFFFFF;
    --border: #E2DDD7;
    --text: #292321;
    --text-soft: #504C46;
    --text-muted: #7A7A7A;
    --primary: #805D47;
    --primary-light: #A88160;
    --primary-pale: #EDE3DA;
    --accent: #D3601E;
    --accent-soft: #FFBC7D;
    --warn-bg: #FFF4E6;
    --warn-border: #FFBC7D;
    --warn-text: #805D47;
    --danger: #B8463A;
    --success: #805D47;
    --font-display: 'Space Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --font-body: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 1280px; margin: 0 auto; padding: 32px 24px; }

  header { margin-bottom: 28px; }
  .brand-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0 18px;
  }
  .brand-bar img.brand-logo { height: 38px; width: auto; }
  .brand-bar img.brand-mark { height: 34px; width: auto; opacity: 0.45; }

  .hero {
    position: relative;
    height: 200px;
    border-radius: 14px;
    overflow: hidden;
    background: linear-gradient(115deg, rgba(41, 35, 33, 0.82) 10%, rgba(128, 93, 71, 0.55) 55%, rgba(211, 96, 30, 0.35) 100%), url('https://casavertical.biomainc.com.br/wp-content/uploads/2024/11/01_BIO-APINAJES_HALL-01_R00-scaled.jpg') center 65% / cover no-repeat;
    box-shadow: 0 8px 24px rgba(41, 35, 33, 0.08);
  }
  .hero-content {
    position: absolute;
    inset: auto 28px 24px 28px;
    color: #FFFFFF;
  }
  .hero-eyebrow {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent-soft);
    margin: 0 0 8px 0;
  }
  h1 {
    margin: 0;
    font-family: var(--font-display);
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -1px;
    color: #FFFFFF;
    line-height: 1.1;
  }
  .subtitle { font-size: 13px; color: rgba(255,255,255,0.85); margin-top: 10px; max-width: 600px; }

  .filters {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 28px;
    display: flex; flex-wrap: wrap; align-items: center; gap: 16px;
  }
  .filter-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .filter-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  .btn-range, .btn-emp, .btn-status {
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text-soft);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-family: var(--font-body);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-range:hover, .btn-emp:hover, .btn-status:hover { border-color: var(--primary); color: var(--primary); }
  .btn-range.active { background: var(--primary); color: white; border-color: var(--primary); }
  .divider { width: 1px; height: 24px; background: var(--border); }

  .dropdown { position: relative; }
  .dropdown-trigger {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-family: var(--font-body);
    cursor: pointer;
    transition: all 0.15s;
    min-width: 170px;
    text-align: left;
  }
  .dropdown-trigger:hover { border-color: var(--primary); }
  .dropdown.open .dropdown-trigger { border-color: var(--primary); background: var(--primary-pale); }
  .dropdown-trigger-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dropdown-trigger-text .count {
    font-family: var(--font-display);
    color: var(--primary);
    font-weight: 700;
    margin-right: 4px;
  }
  .dropdown-chevron { color: var(--text-muted); font-size: 10px; transition: transform 0.15s; }
  .dropdown.open .dropdown-chevron { transform: rotate(180deg); }
  .dropdown-panel {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    min-width: 220px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(41, 35, 33, 0.12);
    z-index: 50;
    padding: 8px;
  }
  .dropdown-actions {
    display: flex;
    gap: 4px;
    padding: 2px 4px 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 6px;
  }
  .dropdown-action {
    border: 0;
    background: transparent;
    color: var(--accent);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--font-body);
  }
  .dropdown-action:hover { background: var(--primary-pale); }
  .dropdown-options {
    list-style: none;
    margin: 0;
    padding: 0;
    max-height: 280px;
    overflow-y: auto;
  }
  .dropdown-option label {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text);
    user-select: none;
  }
  .dropdown-option label:hover { background: var(--primary-pale); }
  .dropdown-option input[type=checkbox] {
    accent-color: var(--primary);
    cursor: pointer;
    width: 14px;
    height: 14px;
  }
  .dropdown-option .status-pill {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-left: auto;
    flex-shrink: 0;
  }
  .dropdown-option .status-pill.s0 { background: var(--primary); }
  .dropdown-option .status-pill.s1 { background: var(--accent); }
  .dropdown-option .status-pill.s2 { background: var(--danger); }

  .date-range-custom { display: flex; align-items: center; gap: 6px; }
  .date-range-custom input[type="date"] {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 12px;
    color: var(--text);
    background: var(--card);
    font-family: inherit;
  }
  .date-range-custom input[type="date"]:focus { outline: none; border-color: var(--primary-light); }
  .btn-apply {
    background: var(--primary);
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-apply:hover { background: var(--accent); }

  .btn-view-data {
    margin-left: auto;
    background: var(--primary);
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-view-data:hover { background: var(--accent); }

  .loading, .error {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-soft);
    font-size: 14px;
  }
  .error { color: var(--danger); }
  .error code { background: #ffe5e0; padding: 2px 6px; border-radius: 4px; font-size: 12px; }

  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .kpi-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .kpi-card:hover {
    border-color: var(--primary-light);
    box-shadow: 0 4px 16px rgba(41, 35, 33, 0.06);
    transform: translateY(-1px);
  }
  .kpi-card::after {
    content: "↗";
    position: absolute;
    top: 14px;
    right: 14px;
    color: var(--text-muted);
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .kpi-card:hover::after { opacity: 1; color: var(--primary); }
  .kpi-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  .kpi-value {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .kpi-delta { font-size: 11px; margin-top: 8px; font-weight: 500; }
  .kpi-delta.up { color: var(--success); }
  .kpi-delta.down { color: var(--danger); }
  .kpi-delta.neutral { color: var(--text-muted); }

  .row { display: grid; gap: 16px; margin-bottom: 16px; }
  .row.two-col { grid-template-columns: 1fr 1fr; }
  @media (max-width: 900px) { .row.two-col { grid-template-columns: 1fr; } }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .card-title {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin: 0 0 4px 0;
    letter-spacing: -0.2px;
  }
  .card-subtitle { font-size: 12px; color: var(--text-muted); margin: 0 0 16px 0; }

  .funnel-row { margin-bottom: 14px; }
  .funnel-head { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-soft); margin-bottom: 6px; }
  .funnel-head .stage-name { font-weight: 600; color: var(--text); }
  .funnel-bar-bg { background: var(--primary-pale); height: 26px; border-radius: 6px; overflow: hidden; }
  .funnel-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 6px; transition: width 0.3s; }
  .funnel-conv { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  .status-row { display: flex; align-items: center; gap: 10px; font-size: 12px; margin-bottom: 8px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.pre { background: var(--primary); }
  .status-dot.vendas { background: var(--accent); }
  .status-name { width: 160px; color: var(--text-soft); }
  .status-bar-bg { flex: 1; height: 8px; background: var(--primary-pale); border-radius: 4px; }
  .status-bar { height: 100%; border-radius: 4px; }
  .status-bar.pre { background: var(--primary); }
  .status-bar.vendas { background: var(--accent); }
  .status-count { width: 50px; text-align: right; font-weight: 600; color: var(--text); font-family: var(--font-display); }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 10px 12px 10px 0;
    border-bottom: 1px solid var(--border);
  }
  thead th.num { text-align: right; padding: 10px 12px; }
  tbody td { padding: 12px 12px 12px 0; border-bottom: 1px solid var(--border); color: var(--text-soft); }
  tbody td.emp { font-weight: 600; color: var(--text); }
  tbody td.num { text-align: right; padding: 12px; font-family: var(--font-display); font-variant-numeric: tabular-nums; }
  tbody td.num.highlight { color: var(--text); font-weight: 700; }
  tbody td.num.clickable { cursor: pointer; color: var(--accent); text-decoration: underline; text-decoration-color: transparent; transition: text-decoration-color 0.15s; }
  tbody td.num.clickable:hover { text-decoration-color: var(--accent); background: var(--primary-pale); }
  tbody tr:hover { background: var(--primary-pale); }

  .diag {
    background: var(--warn-bg);
    border: 1px solid var(--warn-border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 16px;
  }
  .diag-title { font-size: 14px; font-weight: 700; color: var(--warn-text); margin-bottom: 10px; }
  .diag-list { margin: 0; padding-left: 20px; }
  .diag-list li { font-size: 13px; color: var(--warn-text); margin-bottom: 6px; line-height: 1.5; }
  .diag-list li strong { color: #4a3e10; }

  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(41, 35, 33, 0.55);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal {
    background: var(--card);
    border-radius: 12px;
    width: 100%;
    max-width: 1400px;
    max-height: 92vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
  }
  .modal-title { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--text); margin: 0; letter-spacing: -0.2px; }
  .modal-subtitle { font-size: 12px; color: var(--text-muted); margin: 2px 0 0 0; }
  .modal-close {
    background: transparent;
    border: none;
    font-size: 22px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 0 6px;
    line-height: 1;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { overflow: auto; padding: 0; flex: 1; }
  .modal-body table { font-size: 12px; }
  .modal-body thead th { position: sticky; top: 0; background: var(--card); z-index: 1; padding: 10px 12px; white-space: nowrap; }
  .modal-body tbody td { padding: 10px 12px; white-space: nowrap; }
  .modal-loading { padding: 60px; text-align: center; color: var(--text-soft); }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-pre { background: var(--primary-pale); color: var(--primary); }
  .badge-vendas { background: #FFE4CC; color: var(--accent); }
  .badge-aberto { background: var(--primary-pale); color: var(--primary); }
  .badge-ganho { background: #FFE4CC; color: var(--accent); }
  .badge-perdido { background: #F5DAD5; color: var(--danger); }

  .meta-kpi-strip {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
    padding: 16px;
    background: var(--primary-pale);
    border-radius: 10px;
  }
  .meta-kpi-label {
    font-size: 10px;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    font-weight: 600;
  }
  .meta-kpi-value {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    margin-top: 6px;
    letter-spacing: -0.4px;
  }
  .meta-kpi-sub {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 3px;
  }
  .num-money { color: var(--accent); font-weight: 600; }
  .num-zero { color: var(--text-muted); }

  .match-tag {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    font-family: var(--font-body);
  }
  .match-tag.ad { background: #E0F0E0; color: #2d6b2d; }
  .match-tag.campaign { background: var(--primary-pale); color: var(--primary); }
  .match-tag.none { background: #f5e8e3; color: var(--text-muted); }

  .creative-row .creative-name { font-weight: 600; color: var(--text); max-width: 280px; }
  .creative-row .creative-name small { color: var(--text-muted); font-weight: 400; display: block; font-size: 11px; margin-top: 2px; }

  footer { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--border); }
  footer code { background: var(--primary-pale); padding: 2px 6px; border-radius: 4px; color: var(--text-soft); font-family: var(--font-display); }
  .error code { background: #F5DAD5; color: var(--danger); font-family: var(--font-display); }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="brand-bar">
      <img src="https://casavertical.biomainc.com.br/wp-content/uploads/2024/11/Layer_1.png" alt="Casa Vertical" class="brand-logo" />
      <img src="https://casavertical.biomainc.com.br/wp-content/uploads/2024/11/Group-16921.svg" alt="" class="brand-mark" aria-hidden="true" />
    </div>
    <div class="hero">
      <div class="hero-content">
        <p class="hero-eyebrow">Bioma · Casa Vertical</p>
        <h1>Performance do Funil</h1>
        <p class="subtitle">ActiveCampaign · esteira Bioma Vendas + Bozza Nova · dados ao vivo via API</p>
      </div>
    </div>
  </header>

  <div class="filters" id="filters" style="display:none;">
    <div class="filter-group">
      <span class="filter-label">Período:</span>
      <button class="btn-range" data-range="7d">7 dias</button>
      <button class="btn-range active" data-range="30d">30 dias</button>
      <button class="btn-range" data-range="90d">90 dias</button>
      <button class="btn-range" data-range="365d">12 meses</button>
    </div>
    <div class="divider"></div>
    <div class="filter-group date-range-custom">
      <span class="filter-label">Custom:</span>
      <input type="date" id="date-from" />
      <span style="color:var(--text-muted); font-size:12px;">até</span>
      <input type="date" id="date-to" />
      <button class="btn-apply" id="btn-apply-custom">Aplicar</button>
    </div>
    <div class="divider"></div>
    <div class="filter-group">
      <span class="filter-label">Status:</span>
      <div class="dropdown" id="dropdown-status"></div>
    </div>
    <div class="divider"></div>
    <div class="filter-group">
      <span class="filter-label">Empreendimentos:</span>
      <div class="dropdown" id="dropdown-emps"></div>
    </div>
    <button class="btn-view-data" id="btn-view-data">📋 Ver dados filtrados</button>
  </div>

  <div id="content">
    <div class="loading" id="loading">Carregando dados do BigQuery...</div>
  </div>

  <footer>
    Dashboard local · dados via <code>http://localhost:3001</code> · ambiente de validação
  </footer>
</div>

<script>
// ====================================================================
// CONFIG
// ====================================================================
const API_BASE = "http://localhost:3001";

const fmtNum = (v) => (v == null ? "—" : Math.round(v).toLocaleString("pt-BR"));
const fmtBRL = (v) => v == null ? "—" : "R$ " + Math.round(v).toLocaleString("pt-BR");
const fmtPct = (v) => v == null ? "—" : v.toLocaleString("pt-BR", {maximumFractionDigits: 1}) + "%";

// State
const state = {
  range: "30d",
  customFrom: null,
  customTo: null,
  selectedEmps: [],
  allEmps: [],
  selectedStatus: [0, 1, 2],
  statusData: [],
  perfEmpData: [],
  perfEmpDataPrev: [],
  attribData: [],
  creativeData: []
};

// ====================================================================
// HELPERS
// ====================================================================
async function fetchAPI(path) {
  const r = await fetch(API_BASE + path);
  if (!r.ok) throw new Error("API retornou " + r.status);
  return await r.json();
}

function getRangeDays() {
  return { "7d": 7, "30d": 30, "90d": 90, "365d": 365 }[state.range] || 30;
}

function getCurrentRangeDates() {
  if (state.range === "custom" && state.customFrom && state.customTo) {
    return { from: state.customFrom, to: state.customTo };
  }
  const days = getRangeDays();
  const today = new Date();
  const cutoff = new Date(today);
  cutoff.setDate(cutoff.getDate() - days);
  return {
    from: cutoff.toISOString().slice(0, 10),
    to: today.toISOString().slice(0, 10)
  };
}

function delta(cur, prev) {
  if (!prev || prev === 0) return null;
  return ((cur - prev) / prev * 100);
}

function buildPorEmp() {
  return state.perfEmpData.map(e => ({
    empreendimento: e.empreendimento,
    leads: Number(e.leads) || 0,
    contatos_unicos: Number(e.contatos_unicos) || 0,
    qualificados: Number(e.qualificados) || 0,
    agendamentos: Number(e.agendamentos) || 0,
    visitas: Number(e.visitas) || 0,
    negociacoes: Number(e.negociacoes) || 0,
    propostas: Number(e.propostas) || 0,
    ganhos: Number(e.ganhos) || 0,
    pct_qualif: e.leads ? (Number(e.qualificados) / Number(e.leads) * 100) : 0,
    pct_qualif_agend: e.qualificados ? (Number(e.agendamentos) / Number(e.qualificados) * 100) : 0,
    pct_agend_visit: e.agendamentos ? (Number(e.visitas) / Number(e.agendamentos) * 100) : 0,
    dups: (Number(e.leads) || 0) - (Number(e.contatos_unicos) || 0)
  })).sort((a, b) => b.leads - a.leads);
}

function buildDiagnostics(porEmp) {
  const alerts = [];
  const empsComLeads = porEmp.filter(e => e.leads >= 30);
  if (empsComLeads.length === 0) return alerts;

  const avgQualifAgend = empsComLeads.reduce((s, e) => s + e.pct_qualif_agend, 0) / empsComLeads.length;
  if (avgQualifAgend < 15) {
    alerts.push("<strong>Gargalo crítico Qualificação → Agendamento:</strong> média da carteira é " + avgQualifAgend.toFixed(1) + "%. Discutir critério de qualificação e cadência de SDR.");
  }

  const piorVisita = empsComLeads
    .filter(e => e.agendamentos >= 5)
    .sort((a, b) => a.pct_agend_visit - b.pct_agend_visit)[0];
  if (piorVisita && piorVisita.pct_agend_visit < 30) {
    alerts.push("<strong>" + piorVisita.empreendimento + "</strong>: " + piorVisita.pct_agend_visit.toFixed(0) + "% dos agendamentos viram visita realizada. Taxa de no-show alta — revisar fluxo de confirmação e lembretes.");
  }

  const melhor = empsComLeads
    .filter(e => e.qualificados >= 10)
    .sort((a, b) => b.pct_qualif_agend - a.pct_qualif_agend)[0];
  if (melhor && melhor.pct_qualif_agend > avgQualifAgend * 1.5) {
    alerts.push("<strong>" + melhor.empreendimento + "</strong> tem performance acima da carteira: " + melhor.pct_qualif_agend.toFixed(0) + "% de qualif→agend (" + (melhor.pct_qualif_agend / avgQualifAgend).toFixed(1) + "× a média). Vale investigar o que está sendo feito de diferente e replicar.");
  }

  const sem = porEmp.find(e => e.empreendimento === "Sem Empreendimento");
  if (sem && sem.leads > 0) {
    const totalLeads = porEmp.reduce((s, e) => s + e.leads, 0);
    const pctSem = (sem.leads / totalLeads * 100);
    if (pctSem > 15) {
      alerts.push("<strong>Higiene de dados:</strong> " + pctSem.toFixed(0) + "% dos leads no período estão sem empreendimento preenchido (" + sem.leads + " de " + totalLeads + "). Sugere processo automatizado de tagueamento na entrada do lead.");
    }
  }

  return alerts;
}

function getPreviousRangeDates() {
  const { from, to } = getCurrentRangeDates();
  const fromD = new Date(from);
  const toD = new Date(to);
  const rangeMs = toD - fromD;
  const prevTo = new Date(fromD.getTime() - 1);
  const prevFrom = new Date(prevTo.getTime() - rangeMs);
  return {
    from: prevFrom.toISOString().slice(0, 10),
    to: prevTo.toISOString().slice(0, 10)
  };
}

async function fetchPerformanceEmp() {
  const { from, to } = getCurrentRangeDates();
  const prev = getPreviousRangeDates();
  const buildParams = (f, t) => {
    const p = new URLSearchParams();
    p.set("from", f);
    p.set("to", t);
    if (state.selectedEmps.length < state.allEmps.length) {
      p.set("empreendimentos", state.selectedEmps.join(","));
    }
    if (state.selectedStatus.length < 3) {
      p.set("status", state.selectedStatus.join(","));
    }
    return p;
  };
  const [respCur, respPrev, respAttrib, respCreative] = await Promise.all([
    fetchAPI("/api/performance-emp?" + buildParams(from, to).toString()),
    fetchAPI("/api/performance-emp?" + buildParams(prev.from, prev.to).toString()),
    fetchAPI("/api/attribution-emp?" + buildParams(from, to).toString()),
    fetchAPI("/api/attribution-creative?" + buildParams(from, to).toString())
  ]);
  state.perfEmpData = respCur.data;
  state.perfEmpDataPrev = respPrev.data;
  state.attribData = respAttrib.data;
  state.creativeData = respCreative.data;
}

async function loadAll() {
  try {
    document.getElementById("loading").textContent = "Buscando empreendimentos...";
    const empsResp = await fetchAPI("/api/empreendimentos");
    state.allEmps = empsResp.data;
    state.selectedEmps = [...state.allEmps];

    document.getElementById("loading").textContent = "Buscando status atual...";
    const statusResp = await fetchAPI("/api/status-atual");
    state.statusData = statusResp.data;

    buildStatusDropdown();
    buildEmpDropdown();
    document.getElementById("filters").style.display = "flex";
    await renderAsync();
    bindEvents();
  } catch (err) {
    console.error(err);
    document.getElementById("content").innerHTML =
      '<div class="error">' +
      '<p><strong>Não foi possível conectar à API.</strong></p>' +
      '<p>Confirme que o servidor está rodando em <code>' + API_BASE + '</code>.</p>' +
      '<p>No PowerShell da pasta do projeto, rode <code>npm start</code> e tente de novo.</p>' +
      '<p style="margin-top:20px; color:#999;">Detalhe técnico: ' + err.message + '</p>' +
      '</div>';
  }
}

const STATUS_OPTIONS = [
  { value: 0, label: "Aberto" },
  { value: 1, label: "Ganho" },
  { value: 2, label: "Perdido" }
];

function dropdownTriggerText({ items, selected, allLabel, singleLabel, pluralLabel, getLabel }) {
  if (selected.length === 0) {
    return '<span class="count">0</span> ' + pluralLabel;
  }
  if (selected.length === items.length) {
    return '<span class="count">' + items.length + '</span> ' + allLabel;
  }
  if (selected.length <= 2) {
    return selected.map(getLabel).join(", ");
  }
  return '<span class="count">' + selected.length + '</span> ' + (selected.length === 1 ? singleLabel : pluralLabel);
}

function renderDropdown(rootId, { items, getValue, getLabel, isSelected, optionExtra, triggerText, minOne }) {
  const root = document.getElementById(rootId);
  const optionsHtml = items.map(item => {
    const val = getValue(item);
    const checked = isSelected(item) ? "checked" : "";
    const extra = optionExtra ? optionExtra(item) : "";
    return '<li class="dropdown-option">' +
      '<label>' +
        '<input type="checkbox" data-value="' + val + '" ' + checked + '>' +
        '<span>' + getLabel(item) + '</span>' +
        extra +
      '</label>' +
    '</li>';
  }).join("");

  root.innerHTML =
    '<button class="dropdown-trigger" type="button">' +
      '<span class="dropdown-trigger-text">' + triggerText() + '</span>' +
      '<span class="dropdown-chevron">▾</span>' +
    '</button>' +
    '<div class="dropdown-panel" hidden>' +
      '<div class="dropdown-actions">' +
        '<button class="dropdown-action" data-action="all" type="button">Todos</button>' +
        (minOne ? "" : '<button class="dropdown-action" data-action="none" type="button">Limpar</button>') +
      '</div>' +
      '<ul class="dropdown-options">' + optionsHtml + '</ul>' +
    '</div>';
}

function refreshDropdownTrigger(rootId, triggerText) {
  const trigger = document.querySelector('#' + rootId + ' .dropdown-trigger-text');
  if (trigger) trigger.innerHTML = triggerText();
}

function buildStatusDropdown() {
  renderDropdown("dropdown-status", {
    items: STATUS_OPTIONS,
    getValue: (s) => s.value,
    getLabel: (s) => s.label,
    isSelected: (s) => state.selectedStatus.includes(s.value),
    optionExtra: (s) => '<span class="status-pill s' + s.value + '"></span>',
    triggerText: () => dropdownTriggerText({
      items: STATUS_OPTIONS,
      selected: STATUS_OPTIONS.filter(s => state.selectedStatus.includes(s.value)),
      allLabel: "status",
      singleLabel: "status",
      pluralLabel: "status",
      getLabel: (s) => s.label
    }),
    minOne: true
  });
}

function buildEmpDropdown() {

    items,
    getValue: (e) => e.value,
    getLabel: (e) => e.label,
    isSelected: (e) => state.selectedEmps.includes(e.value),
    triggerText: () => dropdownTriggerText({
      items,
      selected: items.filter(e => state.selectedEmps.includes(e.value)),
      allLabel: state.allEmps.length === 1 ? "empreendimento" : "empreendimentos",
      singleLabel: "empreendimento",
      pluralLabel: "empreendimentos",
      getLabel: (e) => e.label
    }),

  });
}

function setupDropdown(rootId, { onToggle, onAll, onNone }) {
  const root = document.getElementById(rootId);
  const trigger = root.querySelector(".dropdown-trigger");
  const panel = root.querySelector(".dropdown-panel");

  trigger.addEventListener("click", (e) => {
    e.stopPropagation();
    document.querySelectorAll(".dropdown.open").forEach(d => {
      if (d !== root) {
        d.classList.remove("open");
        d.querySelector(".dropdown-panel").hidden = true;
      }
    });
    const isOpen = root.classList.toggle("open");
    panel.hidden = !isOpen;
  });

  panel.addEventListener("click", (e) => e.stopPropagation());

  panel.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener("change", () => onToggle(cb.dataset.value, cb.checked));
  });

  const allBtn = panel.querySelector('[data-action="all"]');
  if (allBtn) allBtn.addEventListener("click", onAll);
  const noneBtn = panel.querySelector('[data-action="none"]');
  if (noneBtn) noneBtn.addEventListener("click", onNone);
}

function bindEvents() {
  document.querySelectorAll(".btn-range").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".btn-range").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      state.range = btn.dataset.range;
      state.customFrom = null;
      state.customTo = null;
      document.getElementById("date-from").value = "";
      document.getElementById("date-to").value = "";
      renderAsync();
    });
  });

  document.getElementById("btn-apply-custom").addEventListener("click", () => {
    const from = document.getElementById("date-from").value;
    const to = document.getElementById("date-to").value;
    if (!from || !to) { alert("Selecione data inicial e final."); return; }
    if (from > to) { alert("Data inicial não pode ser maior que a data final."); return; }
    state.customFrom = from;
    state.customTo = to;
    state.range = "custom";
    document.querySelectorAll(".btn-range").forEach(b => b.classList.remove("active"));
    renderAsync();
  });

  setupDropdown("dropdown-status", {
    onToggle: (value, checked) => {
      const v = Number(value);
      if (checked) {
        if (!state.selectedStatus.includes(v)) state.selectedStatus = [...state.selectedStatus, v];
      } else {
        if (state.selectedStatus.length === 1) {
          alert("Selecione ao menos um status.");
          const cb = document.querySelector('#dropdown-status input[data-value="' + v + '"]');
          if (cb) cb.checked = true;
          return;
        }
        state.selectedStatus = state.selectedStatus.filter(s => s !== v);
      }
      refreshDropdownTrigger("dropdown-status", () => dropdownTriggerText({
        items: STATUS_OPTIONS,
        selected: STATUS_OPTIONS.filter(s => state.selectedStatus.includes(s.value)),
        allLabel: "status", singleLabel: "status", pluralLabel: "status",
        getLabel: (s) => s.label
      }));
      renderAsync();
    },
    onAll: () => {
      state.selectedStatus = STATUS_OPTIONS.map(s => s.value);
      buildStatusDropdown();
      setupDropdown("dropdown-status", statusDropdownHandlers());
      document.getElementById("dropdown-status").classList.add("open");
      document.querySelector("#dropdown-status .dropdown-panel").hidden = false;
      renderAsync();
    },
    onNone: () => {}
  });

  setupDropdown("dropdown-emps", {
    onToggle: (value, checked) => {
      if (checked) {
        if (!state.selectedEmps.includes(value)) state.selectedEmps = [...state.selectedEmps, value];
      } else {
        state.selectedEmps = state.selectedEmps.filter(e => e !== value);
      }
      refreshDropdownTrigger("dropdown-emps", () => {
        const items = state.allEmps.map(e => ({ value: e, label: e }));
        return dropdownTriggerText({
          items,
          selected: items.filter(e => state.selectedEmps.includes(e.value)),
          allLabel: state.allEmps.length === 1 ? "empreendimento" : "empreendimentos",
          singleLabel: "empreendimento", pluralLabel: "empreendimentos",
          getLabel: (e) => e.label
        });
      });
      renderAsync();
    },
    onAll: () => {
      state.selectedEmps = [...state.allEmps];
      buildEmpDropdown();
      setupDropdown("dropdown-emps", empDropdownHandlers());
      document.getElementById("dropdown-emps").classList.add("open");
      document.querySelector("#dropdown-emps .dropdown-panel").hidden = false;
      renderAsync();
    },
    onNone: () => {
      state.selectedEmps = [];
      buildEmpDropdown();
      setupDropdown("dropdown-emps", empDropdownHandlers());
      document.getElementById("dropdown-emps").classList.add("open");
      document.querySelector("#dropdown-emps .dropdown-panel").hidden = false;
      renderAsync();
    }
  });

  document.addEventListener("click", () => {
    document.querySelectorAll(".dropdown.open").forEach(d => {
      d.classList.remove("open");
      d.querySelector(".dropdown-panel").hidden = true;
    });
  });

  document.getElementById("btn-view-data").addEventListener("click", () => {
    openModal({ scope: "filtros" });
  });
}

async function openModal({ scope, empreendimento, estagio }) {
  const { from, to } = getCurrentRangeDates();
  const params = new URLSearchParams();
  params.set("from", from);
  params.set("to", to);
  params.set("limit", "2000");
  if (state.selectedStatus.length < 3) {
    params.set("status", state.selectedStatus.join(","));
  }

  let titulo = "";
  const subtitulo = from + " → " + to;

  if (scope === "filtros") {
    if (state.selectedEmps.length < state.allEmps.length) {
      params.set("empreendimentos", state.selectedEmps.join(","));
    }
    titulo = "Todos os deals — filtros ativos";
  } else if (scope === "cell") {
    params.set("empreendimentos", empreendimento);
    if (estagio && estagio !== "leads") params.set("estagio", estagio);
    titulo = empreendimento + " — " + (estagio === "leads" ? "todos os deals" : estagio);
  } else if (scope === "estagio") {
    if (state.selectedEmps.length < state.allEmps.length) {
      params.set("empreendimentos", state.selectedEmps.join(","));
    }
    if (estagio && estagio !== "leads") params.set("estagio", estagio);
    const empsLabel = state.selectedEmps.length < state.allEmps.length
      ? " (" + state.selectedEmps.length + " empreendimentos)"
      : "";
    titulo = (estagio === "leads" ? "Todos os leads" : "Deals em " + estagio) + empsLabel;
  }

  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  backdrop.innerHTML =
    '<div class="modal">' +
      '<div class="modal-header">' +
        '<div>' +
          '<h3 class="modal-title">' + titulo + '</h3>' +
          '<p class="modal-subtitle">' + subtitulo + '</p>' +
        '</div>' +
        '<button class="modal-close" id="modal-close">×</button>' +
      '</div>' +
      '<div class="modal-body">' +
        '<div class="modal-loading">Carregando deals do BigQuery...</div>' +
      '</div>' +
    '</div>';
  document.body.appendChild(backdrop);

  const close = () => backdrop.remove();
  backdrop.addEventListener("click", (e) => { if (e.target === backdrop) close(); });
  backdrop.querySelector("#modal-close").addEventListener("click", close);

  try {
    const resp = await fetchAPI("/api/deals?" + params.toString());
    const deals = resp.data;
    const body = backdrop.querySelector(".modal-body");
    if (deals.length === 0) {
      body.innerHTML = '<div class="modal-loading">Nenhum deal encontrado nesse recorte.</div>';
      return;
    }
    body.innerHTML = renderDealsTable(deals, resp.meta);
  } catch (err) {
    backdrop.querySelector(".modal-body").innerHTML =
      '<div class="modal-loading" style="color:var(--danger)">Erro ao carregar deals: ' + err.message + '</div>';
  }
}

function renderDealsTable(deals, meta) {
  const statusBadge = (d) => {
    if (d.deal_status == 1) return '<span class="badge badge-ganho">Ganho</span>';
    if (d.deal_status == 2) return '<span class="badge badge-perdido">Perdido</span>';
    return '<span class="badge badge-aberto">Aberto</span>';
  };
  const pipelineBadge = (p) => p === "Bozza Nova"
    ? '<span class="badge badge-vendas">Bozza Nova</span>'
    : '<span class="badge badge-pre">Bioma Vendas</span>';
  const prioridadeBadge = (p) => {
    if (!p) return "—";
    const map = { "Quente": "#c44536", "Morno": "#d9822f", "Frio": "#5b6e5b" };
    return '<span style="color:' + (map[p] || 'var(--text-soft)') + '; font-weight:600;">' + p + '</span>';
  };

  const limitWarn = meta.count >= meta.limit
    ? '<div style="padding:10px 16px; background:var(--warn-bg); border-bottom:1px solid var(--warn-border); font-size:12px; color:var(--warn-text);">⚠️ Resultado limitado a ' + meta.limit + ' deals. Refine o filtro pra ver outros.</div>'
    : "";

  const meta_info = '<div style="padding:10px 16px; font-size:12px; color:var(--text-muted); background:#f9fcf7; border-bottom:1px solid var(--border);">' + meta.count + ' deals · estágio: ' + meta.estagio + '</div>';

  const rows = deals.map(d => {
    return '<tr>' +
      '<td>' + d.deal_id + '</td>' +
      '<td>' + (d.contact_nome || "—") + '</td>' +
      '<td>' + (d.contact_email || "—") + '</td>' +
      '<td>' + (d.contact_phone || "—") + '</td>' +
      '<td><strong>' + d.empreendimento + '</strong></td>' +
      '<td>' + (d.metragem_m2 || "—") + '</td>' +
      '<td>' + prioridadeBadge(d.prioridade) + '</td>' +
      '<td>' + pipelineBadge(d.pipeline_atual) + '</td>' +
      '<td>' + (d.stage_titulo_atual || "—") + '</td>' +
      '<td>' + statusBadge(d) + '</td>' +
      '<td>' + (d.sdr_responsavel || "—") + '</td>' +
      '<td class="num">' + (d.valor_deal ? "R$ " + Math.round(d.valor_deal).toLocaleString("pt-BR") : "—") + '</td>' +
      '<td class="num">' + (d.valor_esperado ? "R$ " + Math.round(d.valor_esperado).toLocaleString("pt-BR") : "—") + '</td>' +
      '<td>' + (d.dt_entrada || d.deal_created_at || "—") + '</td>' +
      '<td>' + (d.dt_qualificado || "—") + '</td>' +
      '<td>' + (d.dt_visita_agendada || "—") + '</td>' +
      '<td>' + (d.dt_visita_realizada || "—") + '</td>' +
      '<td>' + (d.dt_negociacao || "—") + '</td>' +
      '<td>' + (d.dt_proposta || "—") + '</td>' +
      '<td>' + (d.dt_fechamento || "—") + '</td>' +
    '</tr>';
  }).join("");

  return meta_info + limitWarn +
    '<div style="padding: 0 16px 16px 16px;">' +
      '<table>' +
        '<thead><tr>' +
          '<th>ID</th><th>Nome</th><th>Email</th><th>Telefone</th><th>Empreendimento</th>' +
          '<th>Metragem</th><th>Prioridade</th><th>Pipeline</th><th>Status atual</th>' +
          '<th>Deal status</th><th>SDR</th><th class="num">Valor</th><th class="num">Vlr esperado</th>' +
          '<th>Entrada</th><th>Qualif.</th><th>V. Agend.</th><th>V. Realiz.</th>' +
          '<th>Negoc.</th><th>Proposta</th><th>Fechamento</th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>' +
    '</div>';
}

async function renderAsync() {
  document.getElementById("content").innerHTML = '<div class="loading">Atualizando dados...</div>';
  try {
    await fetchPerformanceEmp();
    render();
  } catch (err) {
    console.error(err);
    document.getElementById("content").innerHTML =
      '<div class="error">Erro ao atualizar: ' + err.message + '</div>';
  }
}

function sumEmpData(arr) {
  return {
    leads: arr.reduce((s, e) => s + (Number(e.leads) || 0), 0),
    aguardando_retorno: arr.reduce((s, e) => s + (Number(e.aguardando_retorno) || 0), 0),
    qualificados: arr.reduce((s, e) => s + (Number(e.qualificados) || 0), 0),
    agendamentos: arr.reduce((s, e) => s + (Number(e.agendamentos) || 0), 0),
    transferidos: arr.reduce((s, e) => s + (Number(e.transferidos) || 0), 0),
    visitas_confirmadas: arr.reduce((s, e) => s + (Number(e.visitas_confirmadas) || 0), 0),
    visitas: arr.reduce((s, e) => s + (Number(e.visitas) || 0), 0),
    negociacoes: arr.reduce((s, e) => s + (Number(e.negociacoes) || 0), 0),
    propostas: arr.reduce((s, e) => s + (Number(e.propostas) || 0), 0),
    ganhos: arr.reduce((s, e) => s + (Number(e.ganhos) || 0), 0)
  };
}

function render() {
  const cur = sumEmpData(state.perfEmpData);
  const prev = sumEmpData(state.perfEmpDataPrev);
  const porEmp = buildPorEmp();
  const alerts = buildDiagnostics(porEmp);

  const days = getRangeDays();
  const periodLabel = state.range === "custom"
    ? state.customFrom + " a " + state.customTo
    : days + " dias";

  const funilStages = [
    { name: "Leads (Entrada)",     count: cur.leads,               estagio: "leads" },
    { name: "Aguardando retorno",  count: cur.aguardando_retorno,  estagio: "aguardando_retorno" },
    { name: "Em Atendimento",      count: cur.qualificados,        estagio: "qualificados" },
    { name: "Visita Agendada",     count: cur.agendamentos,        estagio: "agendamentos" },
    { name: "Visita Realizada",    count: cur.visitas,             estagio: "visitas" },
    { name: "Em Negociação",       count: cur.negociacoes,         estagio: "negociacoes" },
    { name: "Em Contrato",         count: cur.propostas,           estagio: "propostas" }
  ];
  const maxLeads = funilStages[0].count || 1;

  const statusFilt = state.statusData;
  const statusMax = Math.max(1, ...statusFilt.map(s => Number(s.qtd)));

  const kpis = [
    kpiCardClickable("Leads", fmtNum(cur.leads), delta(cur.leads, prev.leads), "leads"),
    kpiCardClickable("Em Atendimento", fmtNum(cur.qualificados), delta(cur.qualificados, prev.qualificados), "qualificados"),
    kpiCardClickable("Agendamentos", fmtNum(cur.agendamentos), delta(cur.agendamentos, prev.agendamentos), "agendamentos"),
    kpiCardClickable("Visitas realizadas", fmtNum(cur.visitas), delta(cur.visitas, prev.visitas), "visitas"),
    kpiCardClickable("Negociações", fmtNum(cur.negociacoes), delta(cur.negociacoes, prev.negociacoes), "negociacoes"),
    kpiCardClickable("Ganhos", fmtNum(cur.ganhos), delta(cur.ganhos, prev.ganhos), "ganhos")
  ].join("");

  const diagBlock = alerts.length === 0 ? "" :
    '<div class="diag">' +
      '<div class="diag-title">⚠️ Diagnóstico — pontos para conversa com o time</div>' +
      '<ul class="diag-list">' + alerts.map(a => '<li>' + a + '</li>').join("") + '</ul>' +
    '</div>';

  const funnelHtml = funilStages.map((s, i) => {
    const pct = maxLeads ? (s.count / maxLeads * 100) : 0;
    const prevStage = i > 0 ? funilStages[i - 1].count : null;
    const conv = prevStage ? (s.count / prevStage * 100) : 100;
    return '<div class="funnel-row">' +
      '<div class="funnel-head">' +
        '<span class="stage-name">' + s.name + '</span>' +
        '<span class="stage-count">' + fmtNum(s.count) + ' <span style="color:#94a394">(' + fmtPct(pct) + ')</span></span>' +
      '</div>' +
      '<div class="funnel-bar-bg"><div class="funnel-bar" style="width:' + Math.max(pct, 0.5) + '%"></div></div>' +
      (i > 0 ? '<div class="funnel-conv">↓ ' + fmtPct(conv) + ' do estágio anterior</div>' : "") +
    '</div>';
  }).join("");

  const statusHtml = statusFilt.length === 0
    ? '<p class="card-subtitle">Sem dados de status disponíveis.</p>'
    : statusFilt.map(s => {
        return '<div class="status-row">' +
          '<span class="status-dot ' + (s.funil && s.funil.indexOf('bozza') >= 0 ? 'vendas' : 'pre') + '"></span>' +
          '<span class="status-name">' + s.status + '</span>' +
          '<div class="status-bar-bg">' +
            '<div class="status-bar ' + (s.funil && s.funil.indexOf('bozza') >= 0 ? 'vendas' : 'pre') + '" style="width:' + (Number(s.qtd) / statusMax * 100) + '%"></div>' +
          '</div>' +
          '<span class="status-count">' + fmtNum(Number(s.qtd)) + '</span>' +
        '</div>';
      }).join("");

  const tableRows = porEmp.length === 0
    ? '<tr><td colspan="11" style="text-align:center; padding:20px; color:var(--text-muted)">Sem dados no período selecionado.</td></tr>'
    : porEmp.map(e => {
        const dupsTag = e.dups > 0
          ? ' <span style="font-size:10px; color:var(--danger); margin-left:4px;">(−' + e.dups + ')</span>'
          : "";
        const dupsTitle = e.dups > 0 ? e.dups + " deals duplicados (mesmo contato)" : "Sem duplicação";
        return '<tr>' +
          '<td class="emp">' + e.empreendimento + '</td>' +
          '<td class="num clickable" data-emp="' + e.empreendimento + '" data-estagio="leads">' + fmtNum(e.leads) + '</td>' +
          '<td class="num" title="' + dupsTitle + '">' + fmtNum(e.contatos_unicos) + dupsTag + '</td>' +
          '<td class="num clickable" data-emp="' + e.empreendimento + '" data-estagio="qualificados">' + fmtNum(e.qualificados) + '</td>' +
          '<td class="num clickable" data-emp="' + e.empreendimento + '" data-estagio="agendamentos">' + fmtNum(e.agendamentos) + '</td>' +
          '<td class="num clickable highlight" data-emp="' + e.empreendimento + '" data-estagio="visitas">' + fmtNum(e.visitas) + '</td>' +
          '<td class="num clickable" data-emp="' + e.empreendimento + '" data-estagio="negociacoes">' + fmtNum(e.negociacoes) + '</td>' +
          '<td class="num clickable" data-emp="' + e.empreendimento + '" data-estagio="propostas">' + fmtNum(e.propostas) + '</td>' +
          '<td class="num">' + fmtPct(e.pct_qualif) + '</td>' +
          '<td class="num">' + fmtPct(e.pct_qualif_agend) + '</td>' +
          '<td class="num">' + fmtPct(e.pct_agend_visit) + '</td>' +
        '</tr>';
      }).join("");

  const attribBlock = buildAttributionBlock(periodLabel);
  const creativeBlock = buildCreativeBlock(periodLabel);

  const html =
    '<div class="kpi-grid">' + kpis + '</div>' +
    diagBlock +
    attribBlock +
    creativeBlock +
    '<div class="row two-col">' +
      '<div class="card">' +
        '<h3 class="card-title">Funil de conversão</h3>' +
        '<p class="card-subtitle">Cumulativo · ' + periodLabel + '</p>' +
        funnelHtml +
      '</div>' +
      '<div class="card">' +
        '<h3 class="card-title">Onde estão os deals abertos agora</h3>' +
        '<p class="card-subtitle">Fila de trabalho atual · ignora filtros de período · <span style="color:var(--primary-light)">●</span> pré-vendas · <span style="color:var(--accent)">●</span> vendas</p>' +
        statusHtml +
      '</div>' +
    '</div>' +
    '<div class="card" style="margin-bottom:16px;">' +
      '<h3 class="card-title">Performance por empreendimento</h3>' +
      '<p class="card-subtitle">' + periodLabel + ' · clique em qualquer número pra ver os deals · ordenado por volume de leads</p>' +
      '<div class="table-wrap">' +
        '<table>' +
          '<thead><tr>' +
            '<th>Empreendimento</th>' +
            '<th class="num">Leads</th>' +
            '<th class="num" title="Contatos únicos: leads agrupados por contact_id">Contatos</th>' +
            '<th class="num">Qualif.</th>' +
            '<th class="num">Agend.</th>' +
            '<th class="num">Visitas</th>' +
            '<th class="num">Negoc.</th>' +
            '<th class="num">Prop.</th>' +
            '<th class="num">% L→Q</th>' +
            '<th class="num">% Q→A</th>' +
            '<th class="num">% A→V</th>' +
          '</tr></thead>' +
          '<tbody>' + tableRows + '</tbody>' +
        '</table>' +
      '</div>' +
    '</div>';

  document.getElementById("content").innerHTML = html;

  // Bind clicks
  document.querySelectorAll("td.clickable").forEach(td => {
    td.addEventListener("click", () => {
      openModal({
        scope: "cell",
        empreendimento: td.dataset.emp,
        estagio: td.dataset.estagio
      });
    });
  });
  document.querySelectorAll(".kpi-card[data-estagio]").forEach(card => {
    card.addEventListener("click", () => {
      openModal({ scope: "estagio", estagio: card.dataset.estagio });
    });
  });
}

function buildAttributionBlock(periodLabel) {
  const data = state.attribData || [];
  if (data.length === 0) {
    return "";
  }

  const totals = data.reduce((acc, e) => {
    acc.gasto += Number(e.gasto_meta_brl) || 0;
    acc.leads += Number(e.leads) || 0;
    acc.qualif += Number(e.qualificados) || 0;
    acc.impr += Number(e.impressoes) || 0;
    acc.cliques += Number(e.cliques) || 0;
    if (Number(e.gasto_meta_brl) > 0) acc.empsComInvest++;
    if (Number(e.leads) > 0 || Number(e.gasto_meta_brl) > 0) acc.empsTotal++;
    return acc;
  }, { gasto: 0, leads: 0, qualif: 0, impr: 0, cliques: 0, empsComInvest: 0, empsTotal: 0 });

  const cplGlobal = totals.leads ? totals.gasto / totals.leads : null;
  const cpqGlobal = totals.qualif ? totals.gasto / totals.qualif : null;
  const ctrGlobal = totals.impr ? (totals.cliques / totals.impr) * 100 : null;

  const kpiStrip =
    '<div class="meta-kpi-strip">' +
      '<div><div class="meta-kpi-label">Gasto Meta no período</div>' +
        '<div class="meta-kpi-value">' + fmtBRL(totals.gasto) + '</div>' +
        '<div class="meta-kpi-sub">' + fmtNum(totals.impr) + ' impressões · ' + fmtNum(totals.cliques) + ' cliques</div>' +
      '</div>' +
      '<div><div class="meta-kpi-label">CPL global</div>' +
        '<div class="meta-kpi-value">' + (cplGlobal == null ? "—" : fmtBRL(cplGlobal)) + '</div>' +
        '<div class="meta-kpi-sub">' + fmtNum(totals.leads) + ' leads vindos do CRM</div>' +
      '</div>' +
      '<div><div class="meta-kpi-label">CPQ global</div>' +
        '<div class="meta-kpi-value">' + (cpqGlobal == null ? "—" : fmtBRL(cpqGlobal)) + '</div>' +
        '<div class="meta-kpi-sub">' + fmtNum(totals.qualif) + ' qualificados</div>' +
      '</div>' +
      '<div><div class="meta-kpi-label">CTR global</div>' +
        '<div class="meta-kpi-value">' + (ctrGlobal == null ? "—" : fmtPct(ctrGlobal)) + '</div>' +
        '<div class="meta-kpi-sub">' + totals.empsComInvest + ' empreendimento(s) com investimento</div>' +
      '</div>' +
    '</div>';

  const sorted = [...data].sort((a, b) => (Number(b.gasto_meta_brl) || 0) - (Number(a.gasto_meta_brl) || 0));

  const moneyOrZero = (v) => {
    const n = Number(v) || 0;
    if (n === 0) return '<span class="num-zero">—</span>';
    return '<span class="num-money">' + fmtBRL(n) + '</span>';
  };
  const pctOrDash = (v) => {
    if (v == null) return '<span class="num-zero">—</span>';
    const n = Number(v);
    return fmtPct(n);
  };

  const rows = sorted.map(e => {
    const emp = e.empreendimento;
    const gasto = Number(e.gasto_meta_brl) || 0;
    return '<tr>' +
      '<td class="emp">' + emp + '</td>' +
      '<td class="num">' + fmtNum(e.leads) + '</td>' +
      '<td class="num">' + fmtNum(e.qualificados) + '</td>' +
      '<td class="num">' + fmtNum(e.visitas) + '</td>' +
      '<td class="num">' + moneyOrZero(gasto) + '</td>' +
      '<td class="num">' + moneyOrZero(e.cpl_brl) + '</td>' +
      '<td class="num">' + moneyOrZero(e.cpq_brl) + '</td>' +
      '<td class="num">' + moneyOrZero(e.cpv_brl) + '</td>' +
      '<td class="num">' + pctOrDash(e.ctr_pct) + '</td>' +
      '<td class="num">' + moneyOrZero(e.cpc_brl) + '</td>' +
    '</tr>';
  }).join("");

  return '<div class="card" style="margin-bottom:16px;">' +
    '<h3 class="card-title">Atribuição Meta × CRM</h3>' +
    '<p class="card-subtitle">' + periodLabel + ' · gasto na plataforma cruzado com leads/qualificados/visitas do CRM por empreendimento</p>' +
    kpiStrip +
    '<div class="table-wrap">' +
      '<table>' +
        '<thead><tr>' +
          '<th>Empreendimento</th>' +
          '<th class="num">Leads</th>' +
          '<th class="num">Qualif</th>' +
          '<th class="num">Visitas</th>' +
          '<th class="num" title="Total investido no período">Gasto Meta</th>' +
          '<th class="num" title="Custo por lead = gasto / leads CRM">CPL</th>' +
          '<th class="num" title="Custo por qualificado = gasto / qualificados">CPQ</th>' +
          '<th class="num" title="Custo por visita realizada">CPV</th>' +
          '<th class="num">CTR</th>' +
          '<th class="num">CPC</th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>' +
    '</div>' +
  '</div>';
}

function buildCreativeBlock(periodLabel) {
  const data = state.creativeData || [];
  if (data.length === 0) return "";

  const tagFor = (matchType) => {
    if (matchType === "AD_NAME") return '<span class="match-tag ad" title="Bate com nome de anuncio no Meta">✓ AD</span>';
    if (matchType === "CAMPAIGN_NAME") return '<span class="match-tag campaign" title="Bate com nome de campanha (nao individual)">~ CAMP</span>';
    return '<span class="match-tag none" title="Sem match no Meta - audience, lookalike ou criativo descontinuado">—</span>';
  };

  const moneyOr = (v) => {
    const n = Number(v) || 0;
    if (n === 0) return '<span class="num-zero">—</span>';
    return '<span class="num-money">' + fmtBRL(n) + '</span>';
  };

  const rows = data.slice(0, 20).map(c => {
    return '<tr class="creative-row">' +
      '<td class="creative-name">' + c.criativo + '<small>' + (c.empreendimento || '—') + ' · ' + tagFor(c.match_type) + '</small></td>' +
      '<td class="num">' + fmtNum(c.leads) + '</td>' +
      '<td class="num">' + fmtNum(c.qualificados) + '</td>' +
      '<td class="num">' + fmtNum(c.agendamentos) + '</td>' +
      '<td class="num">' + fmtNum(c.visitas) + '</td>' +
      '<td class="num">' + moneyOr(c.gasto_brl) + '</td>' +
      '<td class="num">' + moneyOr(c.cpl_brl) + '</td>' +
      '<td class="num">' + moneyOr(c.cpq_brl) + '</td>' +
      '<td class="num">' + (c.ctr_pct != null && Number(c.ctr_pct) > 0 ? fmtPct(Number(c.ctr_pct)) : '<span class="num-zero">—</span>') + '</td>' +
    '</tr>';
  }).join("");

  const totalDeals = data.reduce((s, c) => s + (Number(c.leads) || 0), 0);
  const adsBateu = data.filter(c => c.match_type === "AD_NAME").length;

  return '<div class="card" style="margin-bottom:16px;">' +
    '<h3 class="card-title">Top criativos × leads (atribuição AC × Meta)</h3>' +
    '<p class="card-subtitle">' + periodLabel + ' · ' + data.length + ' criativos · ' + totalDeals + ' deals taggeados · ' + adsBateu + ' bateram com Meta ads · gasto disponível apenas onde houve match</p>' +
    '<div class="table-wrap">' +
      '<table>' +
        '<thead><tr>' +
          '<th>Criativo · empreendimento · match</th>' +
          '<th class="num">Leads</th>' +
          '<th class="num">Qualif</th>' +
          '<th class="num">Agend</th>' +
          '<th class="num">Visitas</th>' +
          '<th class="num">Gasto Meta</th>' +
          '<th class="num">CPL</th>' +
          '<th class="num">CPQ</th>' +
          '<th class="num">CTR</th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>' +
    '</div>' +
  '</div>';
}

function kpiCardClickable(label, value, deltaVal, estagio) {
  const arrow = deltaVal == null ? "" : deltaVal > 0 ? "▲" : deltaVal < 0 ? "▼" : "";
  const klass = deltaVal == null ? "neutral" : deltaVal > 0 ? "up" : deltaVal < 0 ? "down" : "neutral";
  const deltaText = deltaVal == null ? "" : arrow + " " + Math.abs(deltaVal).toFixed(1) + "% vs. anterior";
  return '<div class="kpi-card" data-estagio="' + estagio + '">' +
    '<div class="kpi-label">' + label + '</div>' +
    '<div class="kpi-value">' + value + '</div>' +
    (deltaText ? '<div class="kpi-delta ' + klass + '">' + deltaText + '</div>' : "") +
  '</div>';
}

// Start
loadAll();
</script>

</body>
</html>
