name: Deploy Cloud Run

# Trigger: push em main que toque o backend ou o Dockerfile.
# Vercel cuida do frontend sozinho ao detectar push (configurado no painel).
on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/deploy-cloud-run.yml'
  workflow_dispatch:  # permite disparar manualmente do GitHub UI

env:
  REGION: southamerica-east1
  SERVICE: dashboard-api
  IMAGE_REPO: dashboard

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # necessario pro Workload Identity Federation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Verify required secrets
        run: |
          if [ -z "${{ secrets.GCP_PROJECT }}" ]; then
            echo "::error::GitHub Secret GCP_PROJECT nao esta configurado em repo settings"
            exit 1
          fi
          echo "GCP_PROJECT secret tem valor (length: ${#__P__})"
          echo "Repository: ${{ github.repository }}"
          echo "REGION env: ${{ env.REGION }}"
          echo "IMAGE_REPO env: ${{ env.IMAGE_REPO }}"
        env:
          __P__: ${{ secrets.GCP_PROJECT }}

      - name: Check Artifact Registry repo exists
        run: |
          echo "Verificando se Artifact Registry repo '${{ env.IMAGE_REPO }}' existe em ${{ secrets.GCP_PROJECT }}/${{ env.REGION }}..."
          if ! gcloud artifacts repositories describe ${{ env.IMAGE_REPO }} --location=${{ env.REGION }} --project=${{ secrets.GCP_PROJECT }} 2>&1; then
            echo "::warning::Repo nao existe ou SA sem permissao. Tentando criar..."
            gcloud artifacts repositories create ${{ env.IMAGE_REPO }} \
              --repository-format=docker \
              --location=${{ env.REGION }} \
              --project=${{ secrets.GCP_PROJECT }} \
              --description="Cloud Run images for dashboard-api" \
              || (echo "::error::Falha ao criar Artifact Registry repo. SA precisa de roles/artifactregistry.admin no projeto ${{ secrets.GCP_PROJECT }}" && exit 1)
            echo "Repo criado com sucesso"
          else
            echo "Repo ja existe, OK"
          fi

      - name: Build & push image
        run: |
          set -e
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/${{ env.IMAGE_REPO }}/api"
          echo "Building image: $IMAGE"
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          echo "Build OK, pushing tag ${{ github.sha }}..."
          docker push "$IMAGE:${{ github.sha }}"
          echo "Pushing tag latest..."
          docker push "$IMAGE:latest"
          echo "All pushes OK"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/${{ env.IMAGE_REPO }}/api:${{ github.sha }}" \
            --region=${{ env.REGION }} \
            --quiet

      - name: Show deployed URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)'
