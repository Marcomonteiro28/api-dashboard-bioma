name: Deploy Cloud Run

# Trigger: push em main que toque o backend ou o Dockerfile.
# Vercel cuida do frontend sozinho ao detectar push (configurado no painel).
# Last triggered: 2026-06-01 (re-deploy apos grant serviceUsageConsumer + storage.admin)
on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/deploy-cloud-run.yml'
  workflow_dispatch:  # permite disparar manualmente do GitHub UI

env:
  REGION: southamerica-east1
  SERVICE: dashboard-api
  IMAGE_REPO: dashboard

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # necessario pro Workload Identity Federation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify required secrets
        run: |
          if [ -z "${{ secrets.GCP_PROJECT }}" ]; then
            echo "::error::GitHub Secret GCP_PROJECT nao esta configurado em repo settings"
            exit 1
          fi
          echo "GCP_PROJECT secret OK (length: ${#__P__})"
          echo "Repository: ${{ github.repository }}"
        env:
          __P__: ${{ secrets.GCP_PROJECT }}

      - name: Ensure Artifact Registry repo exists
        run: |
          if ! gcloud artifacts repositories describe ${{ env.IMAGE_REPO }} \
            --location=${{ env.REGION }} --project=${{ secrets.GCP_PROJECT }} >/dev/null 2>&1; then
            echo "Repo nao existe. Criando..."
            gcloud artifacts repositories create ${{ env.IMAGE_REPO }} \
              --repository-format=docker \
              --location=${{ env.REGION }} \
              --project=${{ secrets.GCP_PROJECT }}
          else
            echo "Repo ja existe, OK"
          fi

      - name: Build image via Cloud Build & push to Artifact Registry
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/${{ env.IMAGE_REPO }}/api"
          echo "Submitting build to Cloud Build → $IMAGE:${{ github.sha }}"
          # Cloud Build roda no GCP, builda e empurra direto pro AR.
          # Mais confiavel que docker no runner + tem logs detalhados em Cloud Logging.
          gcloud builds submit \
            --tag="$IMAGE:${{ github.sha }}" \
            --project=${{ secrets.GCP_PROJECT }} \
            --timeout=900s \
            --default-buckets-behavior=REGIONAL_USER_OWNED_BUCKET
          # Tagueia tambem como :latest pra facilitar referencias manuais
          gcloud artifacts docker tags add \
            "$IMAGE:${{ github.sha }}" \
            "$IMAGE:latest" \
            --project=${{ secrets.GCP_PROJECT }} || echo "::warning::Tag latest falhou (ignoravel)"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/${{ env.IMAGE_REPO }}/api:${{ github.sha }}" \
            --region=${{ env.REGION }} \
            --quiet

      - name: Show deployed URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)'
